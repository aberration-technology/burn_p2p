name: Release Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".cargo/config.toml"
      - ".github/workflows/publish-readiness.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "xtask/**"
      - "justfile"
      - "scripts/release_prep.sh"
      - "crates/**"
      - "docs/testing/**"

concurrency:
  group: publish-readiness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y redis-server
      - run: cargo xtask ci publish --keep-artifacts
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-readiness-artifacts
          path: target/test-artifacts
          if-no-files-found: ignore
