services:
  burn-p2p-bootstrap-base:
    build:
      context: ../..
      dockerfile: deploy/containers/bootstrap.Dockerfile
    ports:
      - "127.0.0.1:8787:8787"
      - "4001:4001/tcp"
      - "4001:4001/udp"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      BURN_P2P_OPERATOR_STATE_POSTGRES_URL: ${BURN_P2P_OPERATOR_STATE_POSTGRES_URL:-}
      BURN_P2P_OPERATOR_STATE_POSTGRES_TABLE: ${BURN_P2P_OPERATOR_STATE_POSTGRES_TABLE:-burn_p2p_operator_state_snapshots}
      BURN_P2P_OPERATOR_STATE_REDIS_URL: ${BURN_P2P_OPERATOR_STATE_REDIS_URL:-}
      BURN_P2P_OPERATOR_STATE_KEY_PREFIX: ${BURN_P2P_OPERATOR_STATE_KEY_PREFIX:-burn-p2p:operator-state}
      BURN_P2P_AUTH_SESSION_REDIS_URL: ${BURN_P2P_AUTH_SESSION_REDIS_URL:-}
      BURN_P2P_GITHUB_CLIENT_ID: ${BURN_P2P_GITHUB_CLIENT_ID:-}
      BURN_P2P_GITHUB_CLIENT_SECRET: ${BURN_P2P_GITHUB_CLIENT_SECRET:-}
      BURN_P2P_GITHUB_REDIRECT_URI: ${BURN_P2P_GITHUB_REDIRECT_URI:-}
      BURN_P2P_OIDC_ISSUER: ${BURN_P2P_OIDC_ISSUER:-}
      BURN_P2P_OIDC_AUTHORIZE_BASE_URL: ${BURN_P2P_OIDC_AUTHORIZE_BASE_URL:-}
      BURN_P2P_OIDC_TOKEN_URL: ${BURN_P2P_OIDC_TOKEN_URL:-}
      BURN_P2P_OIDC_CLIENT_ID: ${BURN_P2P_OIDC_CLIENT_ID:-}
      BURN_P2P_OIDC_CLIENT_SECRET: ${BURN_P2P_OIDC_CLIENT_SECRET:-}
      BURN_P2P_OIDC_REDIRECT_URI: ${BURN_P2P_OIDC_REDIRECT_URI:-}
      BURN_P2P_ARTIFACT_S3_ENDPOINT: ${BURN_P2P_ARTIFACT_S3_ENDPOINT:-}
      BURN_P2P_ARTIFACT_S3_BUCKET: ${BURN_P2P_ARTIFACT_S3_BUCKET:-}
      BURN_P2P_ARTIFACT_S3_REGION: ${BURN_P2P_ARTIFACT_S3_REGION:-}
      BURN_P2P_ARTIFACT_S3_ACCESS_KEY_ID: ${BURN_P2P_ARTIFACT_S3_ACCESS_KEY_ID:-}
      BURN_P2P_ARTIFACT_S3_SECRET_ACCESS_KEY: ${BURN_P2P_ARTIFACT_S3_SECRET_ACCESS_KEY:-}
      BURN_P2P_ARTIFACT_S3_PATH_PREFIX: ${BURN_P2P_ARTIFACT_S3_PATH_PREFIX:-}
      BURN_P2P_ARTIFACT_S3_SERVER_SIDE_ENCRYPTION: ${BURN_P2P_ARTIFACT_S3_SERVER_SIDE_ENCRYPTION:-}
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
