x-trainer-build: &trainer-build
  context: ../..
  args:
    APP_MANIFEST_PATH: ${BURN_P2P_TRAINER_APP_MANIFEST_PATH:-crates/burn_p2p/Cargo.toml}
    APP_TARGET_KIND: ${BURN_P2P_TRAINER_APP_TARGET_KIND:-example}
    APP_TARGET_NAME: ${BURN_P2P_TRAINER_APP_TARGET_NAME:-synthetic_trainer}
    APP_FEATURES: ${BURN_P2P_TRAINER_APP_FEATURES:-burn}
    APP_NO_DEFAULT_FEATURES: ${BURN_P2P_TRAINER_APP_NO_DEFAULT_FEATURES:-false}

x-bootstrap-node: &bootstrap-node
  build:
    context: ../..
    dockerfile: deploy/containers/bootstrap.Dockerfile
  environment:
    RUST_LOG: ${RUST_LOG:-info}
    BURN_P2P_OPERATOR_STATE_POSTGRES_URL: ${BURN_P2P_OPERATOR_STATE_POSTGRES_URL:-}
    BURN_P2P_OPERATOR_STATE_POSTGRES_TABLE: ${BURN_P2P_OPERATOR_STATE_POSTGRES_TABLE:-burn_p2p_operator_state_snapshots}
    BURN_P2P_OPERATOR_STATE_REDIS_URL: ${BURN_P2P_OPERATOR_STATE_REDIS_URL:-}
    BURN_P2P_OPERATOR_STATE_KEY_PREFIX: ${BURN_P2P_OPERATOR_STATE_KEY_PREFIX:-burn-p2p:operator-state}
    BURN_P2P_AUTH_SESSION_REDIS_URL: ${BURN_P2P_AUTH_SESSION_REDIS_URL:-}
    BURN_P2P_GITHUB_CLIENT_ID: ${BURN_P2P_GITHUB_CLIENT_ID:-}
    BURN_P2P_GITHUB_CLIENT_SECRET: ${BURN_P2P_GITHUB_CLIENT_SECRET:-}
    BURN_P2P_GITHUB_REDIRECT_URI: ${BURN_P2P_GITHUB_REDIRECT_URI:-}
    BURN_P2P_OIDC_ISSUER: ${BURN_P2P_OIDC_ISSUER:-}
    BURN_P2P_OIDC_AUTHORIZE_BASE_URL: ${BURN_P2P_OIDC_AUTHORIZE_BASE_URL:-}
    BURN_P2P_OIDC_TOKEN_URL: ${BURN_P2P_OIDC_TOKEN_URL:-}
    BURN_P2P_OIDC_CLIENT_ID: ${BURN_P2P_OIDC_CLIENT_ID:-}
    BURN_P2P_OIDC_CLIENT_SECRET: ${BURN_P2P_OIDC_CLIENT_SECRET:-}
    BURN_P2P_OIDC_REDIRECT_URI: ${BURN_P2P_OIDC_REDIRECT_URI:-}
    BURN_P2P_ARTIFACT_S3_ENDPOINT: ${BURN_P2P_ARTIFACT_S3_ENDPOINT:-}
    BURN_P2P_ARTIFACT_S3_BUCKET: ${BURN_P2P_ARTIFACT_S3_BUCKET:-}
    BURN_P2P_ARTIFACT_S3_REGION: ${BURN_P2P_ARTIFACT_S3_REGION:-}
    BURN_P2P_ARTIFACT_S3_ACCESS_KEY_ID: ${BURN_P2P_ARTIFACT_S3_ACCESS_KEY_ID:-}
    BURN_P2P_ARTIFACT_S3_SECRET_ACCESS_KEY: ${BURN_P2P_ARTIFACT_S3_SECRET_ACCESS_KEY:-}
    BURN_P2P_ARTIFACT_S3_PATH_PREFIX: ${BURN_P2P_ARTIFACT_S3_PATH_PREFIX:-}
    BURN_P2P_ARTIFACT_S3_SERVER_SIDE_ENCRYPTION: ${BURN_P2P_ARTIFACT_S3_SERVER_SIDE_ENCRYPTION:-}
  restart: unless-stopped
  init: true
  read_only: true
  tmpfs:
    - /tmp
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  burn-p2p-redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "yes"]
    volumes:
      - burn-p2p-redis-data:/data
    restart: unless-stopped

  burn-p2p-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${BURN_P2P_OPERATOR_STATE_POSTGRES_DB:-burn_p2p}
      POSTGRES_USER: ${BURN_P2P_OPERATOR_STATE_POSTGRES_USER:-burn_p2p}
      POSTGRES_PASSWORD: ${BURN_P2P_OPERATOR_STATE_POSTGRES_PASSWORD:-burn-p2p-dev}
    volumes:
      - burn-p2p-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  bootstrap:
    <<: *bootstrap-node
    build:
      context: ../..
      dockerfile: deploy/containers/bootstrap.Dockerfile
      args:
        BURN_P2P_BOOTSTRAP_FEATURES: ${BURN_P2P_BOOTSTRAP_FEATURES:-admin-http,metrics}
    command: ["/config/reference-bootstrap.json"]
    depends_on:
      - burn-p2p-redis
      - burn-p2p-postgres
    ports:
      - "8787:8787"
      - "4001:4001/tcp"
      - "4001:4001/udp"
    volumes:
      - ../config/reference-bootstrap.json:/config/reference-bootstrap.json:ro
      - burn-p2p-bootstrap-data:/var/lib/burn-p2p

  validator:
    <<: *bootstrap-node
    build:
      context: ../..
      dockerfile: deploy/containers/bootstrap.Dockerfile
      args:
        BURN_P2P_BOOTSTRAP_FEATURES: ${BURN_P2P_VALIDATOR_FEATURES:-admin-http,metrics}
    command: ["/config/reference-validator.json"]
    depends_on:
      - bootstrap
      - burn-p2p-redis
      - burn-p2p-postgres
    ports:
      - "8788:8788"
      - "4002:4002/tcp"
      - "4002:4002/udp"
    volumes:
      - ../config/reference-validator.json:/config/reference-validator.json:ro
      - burn-p2p-validator-data:/var/lib/burn-p2p

  reducer:
    <<: *bootstrap-node
    build:
      context: ../..
      dockerfile: deploy/containers/bootstrap.Dockerfile
      args:
        BURN_P2P_BOOTSTRAP_FEATURES: ${BURN_P2P_REDUCER_FEATURES:-admin-http,metrics}
    command: ["/config/reference-reducer.json"]
    depends_on:
      - bootstrap
      - burn-p2p-redis
      - burn-p2p-postgres
    ports:
      - "8789:8789"
      - "4003:4003/tcp"
      - "4003:4003/udp"
    volumes:
      - ../config/reference-reducer.json:/config/reference-reducer.json:ro
      - burn-p2p-reducer-data:/var/lib/burn-p2p

  trainer-cpu:
    profiles: ["trainers"]
    build:
      <<: *trainer-build
      dockerfile: deploy/containers/node-native.Dockerfile
    depends_on:
      - bootstrap
      - validator
      - reducer
    command: ${BURN_P2P_TRAINER_CPU_COMMAND:-/config/trainer.json}
    volumes:
      - ${BURN_P2P_TRAINER_CPU_CONFIG_PATH:-./trainer.json}:/config/trainer.json:ro
      - burn-p2p-trainer-cpu-data:/var/lib/burn-p2p
    environment:
      RUST_LOG: ${RUST_LOG:-info}
    restart: unless-stopped

  trainer-gpu:
    profiles: ["trainers", "gpu"]
    build:
      <<: *trainer-build
      dockerfile: deploy/containers/node-cuda.Dockerfile
    depends_on:
      - bootstrap
      - validator
      - reducer
    command: ${BURN_P2P_TRAINER_GPU_COMMAND:-/config/trainer-gpu.json}
    volumes:
      - ${BURN_P2P_TRAINER_GPU_CONFIG_PATH:-./trainer-gpu.json}:/config/trainer-gpu.json:ro
      - burn-p2p-trainer-gpu-data:/var/lib/burn-p2p
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    gpus: all
    restart: unless-stopped

volumes:
  burn-p2p-redis-data: {}
  burn-p2p-postgres-data: {}
  burn-p2p-bootstrap-data: {}
  burn-p2p-validator-data: {}
  burn-p2p-reducer-data: {}
  burn-p2p-trainer-cpu-data: {}
  burn-p2p-trainer-gpu-data: {}
