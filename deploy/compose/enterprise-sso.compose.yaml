services:
  burn-p2p-redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - burn-p2p-redis-data:/data
    restart: unless-stopped

  burn-p2p-bootstrap:
    build:
      context: ../..
      dockerfile: deploy/containers/bootstrap.Dockerfile
      args:
        BURN_P2P_BOOTSTRAP_FEATURES: ${BURN_P2P_BOOTSTRAP_FEATURES:-admin-http,metrics,browser-edge,rbac,auth-oidc}
    command: ["/config/enterprise-sso.json"]
    depends_on:
      - burn-p2p-redis
    ports:
      - "8787:8787"
      - "4001:4001/tcp"
      - "4001:4001/udp"
    volumes:
      - ../config/enterprise-sso.json:/config/enterprise-sso.json:ro
      - burn-p2p-bootstrap-data:/var/lib/burn-p2p
    environment:
      RUST_LOG: ${RUST_LOG:-info}
    restart: unless-stopped

volumes:
  burn-p2p-bootstrap-data: {}
  burn-p2p-redis-data: {}
