services:
  burn-p2p-bootstrap:
    image: ghcr.io/example/burn-p2p-bootstrap:latest
    command: ["/app/burn-p2p-bootstrap", "/config/community-web.json"]
    ports:
      - "9000:9000"
    volumes:
      - ../../crates/burn_p2p_bootstrap/examples/community-web.json:/config/community-web.json:ro
      - burn-p2p-data:/var/lib/burn-p2p
    environment:
      RUST_LOG: info
    restart: unless-stopped

volumes:
  burn-p2p-data: {}
