[package]
name = "mnist_p2p_demo"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["rlib", "cdylib"]

[workspace]
members = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
anyhow = "1"
burn = { version = "0.21.0-pre.2", default-features = false, features = ["std", "train", "vision", "ndarray", "webgpu"] }
burn_p2p = { path = "../../crates/burn_p2p", features = ["burn"] }
burn_p2p_browser = { path = "../../crates/burn_p2p_browser" }
burn_p2p_core = { path = "../../crates/burn_p2p_core" }
burn_p2p_metrics = { path = "../../crates/burn_p2p_metrics" }
burn_p2p_views = { path = "../../crates/burn_p2p_views" }
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
semver = { version = "1", features = ["serde"] }
wasm-bindgen-cli-support = "0.2.117"

[target.'cfg(target_arch = "wasm32")'.dependencies]
burn = { version = "0.21.0-pre.2", default-features = false, features = ["webgpu", "autodiff"] }
console_error_panic_hook = "0.1"
getrandom = { version = "0.4", features = ["wasm_js"] }
serde-wasm-bindgen = "0.6"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-time = "1"
web-sys = { version = "0.3", features = ["console"] }
