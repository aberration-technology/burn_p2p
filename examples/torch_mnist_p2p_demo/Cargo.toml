[package]
name = "torch_mnist_p2p_demo"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[workspace]
members = []

[dependencies]
anyhow = "1"
burn_p2p = { path = "../../crates/burn_p2p" }
burn_p2p_python = { path = "../../crates/burn_p2p_python" }
chrono = { version = "0.4", features = ["serde"] }
semver = { version = "1", features = ["serde"] }
serde_json = "1"

[profile.dev.package."libp2p-request-response"]
debug-assertions = false

[profile.test.package."libp2p-request-response"]
debug-assertions = false
